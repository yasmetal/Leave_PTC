<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ระบบใบลาออนไลน์ | Phattha Packdee</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <img
        class="app-logo"
        src="assets/logo.png"
        srcset="assets/logo.png 1x, assets/logo@2x.png 2x"
        alt="Phattha Packdee"
        width="72" height="66">
      <h1>ระบบยื่นใบลาออนไลน์</h1>
      <p class="subtitle">กรอกแบบฟอร์มด้านล่างให้ครบถ้วน ระบบจะบันทึกข้อมูลอัตโนมัติ</p>
      <p id="connStatus" class="conn-status checking">🔄 กำลังตรวจสอบการเชื่อมต่อ...</p>
    </header>

    <form id="leaveForm" class="leave-form" novalidate>

      <section class="form-section">
        <h2>ข้อมูลผู้ลา</h2>

        <div class="field">
          <label for="fullName">ชื่อ-นามสกุล <span class="req">*</span></label>
          <input type="text" id="fullName" name="fullName" required autocomplete="name">
        </div>

        <div class="field-row">
          <div class="field">
            <label for="employeeId">รหัสพนักงาน</label>
            <input type="text" id="employeeId" name="employeeId" autocomplete="off">
          </div>
          <div class="field">
            <label for="position">ตำแหน่ง</label>
            <input type="text" id="position" name="position">
          </div>
        </div>

        <div class="field">
          <label for="department">แผนก / ฝ่าย <span class="req">*</span></label>
          <input type="text" id="department" name="department" required>
        </div>

        <div class="field">
          <label for="phone">เบอร์ติดต่อระหว่างลา <span class="req">*</span></label>
          <input type="tel" id="phone" name="phone" required inputmode="tel" placeholder="08X-XXX-XXXX">
        </div>
      </section>

      <section class="form-section">
        <h2>รายละเอียดการลา</h2>

        <div class="field">
          <label for="leaveType">ประเภทการลา <span class="req">*</span></label>
          <select id="leaveType" name="leaveType" required>
            <option value="" disabled selected>-- เลือกประเภทการลา --</option>
            <option value="ลาป่วย">ลาป่วย</option>
            <option value="ลากิจ">ลากิจส่วนตัว</option>
            <option value="ลาพักร้อน">ลาพักร้อน</option>
            <option value="ลาคลอด">ลาคลอด</option>
            <option value="ลาบวช">ลาบวช</option>
            <option value="ลาไม่รับค่าจ้าง">ลาไม่รับค่าจ้าง</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="startDate">วันที่เริ่มลา <span class="req">*</span></label>
            <input type="date" id="startDate" name="startDate" required>
          </div>
          <div class="field">
            <label for="endDate">วันที่สิ้นสุดการลา <span class="req">*</span></label>
            <input type="date" id="endDate" name="endDate" required>
          </div>
        </div>

        <div class="field">
          <label for="totalDays">จำนวนวันลา (คำนวณอัตโนมัติ)</label>
          <input type="text" id="totalDays" name="totalDays" readonly placeholder="0 วัน">
        </div>

        <div class="field">
          <label for="reason">เหตุผล / รายละเอียดเพิ่มเติม <span class="req">*</span></label>
          <textarea id="reason" name="reason" rows="4" required></textarea>
        </div>
      </section>

      <section class="form-section">
        <h2>การอนุมัติ</h2>

        <div class="field">
          <label for="approver">ผู้อนุมัติ (หัวหน้างาน) <span class="req">*</span></label>
          <input type="text" id="approver" name="approver" required>
        </div>

        <div class="field">
          <label for="signature">ลงชื่อผู้ยื่นคำร้อง (พิมพ์ชื่อ-สกุลแทนลายเซ็น) <span class="req">*</span></label>
          <input type="text" id="signature" name="signature" required placeholder="พิมพ์ชื่อ-นามสกุลของท่าน">
        </div>
      </section>

      <div class="form-actions">
        <button type="submit" id="submitBtn" class="btn-primary">ส่งใบลา</button>
        <button type="reset" class="btn-secondary">ล้างข้อมูล</button>
      </div>

      <p id="statusMsg" class="status-msg" role="status"></p>
    </form>

    <footer class="app-footer">
      <img class="footer-logo" src="assets/logo.png" alt="" width="28" height="26" aria-hidden="true">
      <p>ระบบใบลาภายในองค์กร · ข้อมูลจะถูกบันทึกลง Google Sheet โดยอัตโนมัติ</p>
      <button type="button" id="recheckBtn" class="btn-link">🔄 ทดสอบการเชื่อมต่ออีกครั้ง</button>
    </footer>
  </div>

  <!-- Popup แจ้งผลการส่งใบลา: แสดงทุกครั้งที่กด "ส่งใบลา" ไม่ว่าสำเร็จหรือไม่ พร้อมบอกว่าติดขั้นตอนไหน -->
  <div id="resultModal" class="modal-overlay" hidden>
    <div class="modal-box" role="alertdialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
      <div id="modalIcon" class="modal-icon">✅</div>
      <h3 id="modalTitle" class="modal-title">หัวข้อ</h3>
      <p id="modalMessage" class="modal-message">ข้อความ</p>
      <ol id="modalSteps" class="modal-steps"></ol>
      <button type="button" id="modalCloseBtn" class="btn-primary modal-close-btn">ตกลง</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
